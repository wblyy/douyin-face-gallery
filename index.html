<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Douyin Face Gallery + Grok Video</title>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #13131f;
    --surface2: #1a1a2e;
    --border: #2a2a3e;
    --text: #e0e0e8;
    --text2: #8888a0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --danger: #ff6b6b;
    --success: #2ed573;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }
  .header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
  .header .stats { color: var(--text2); font-size: 13px; }
  .blogger-nav {
    display: flex;
    gap: 8px;
    padding: 16px 32px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    -webkit-overflow-scrolling: touch;
  }
  .blogger-tab {
    padding: 6px 16px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .blogger-tab:hover { border-color: var(--accent); color: var(--text); }
  .blogger-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .blogger-tab .count { opacity: 0.7; margin-left: 4px; font-size: 11px; }
  .main { display: flex; height: calc(100vh - 120px); }
  .gallery-panel { flex: 1; overflow-y: auto; padding: 24px 32px; }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .thumb {
    position: relative;
    aspect-ratio: 9/16;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    background: var(--surface);
  }
  .thumb:hover { border-color: var(--accent2); transform: translateY(-2px); }
  .thumb.selected { border-color: var(--accent); box-shadow: 0 0 20px rgba(108,92,231,0.3); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb .label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 4px 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }
  .video-panel {
    width: 420px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow-y: auto;
  }
  .video-panel.hidden { display: none; }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-header h3 { font-size: 14px; font-weight: 600; }
  .close-btn { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; }
  .close-btn:hover { color: var(--text); }
  .selected-preview { padding: 16px 20px; display: flex; gap: 12px; align-items: flex-start; }
  .selected-preview img { width: 80px; height: 142px; object-fit: cover; border-radius: 6px; }
  .selected-info { flex: 1; font-size: 13px; }
  .selected-info .blogger-name { font-weight: 600; margin-bottom: 4px; }
  .selected-info .file-name { color: var(--text2); font-size: 11px; }
  .prompt-area { padding: 0 20px 16px; }
  .prompt-area label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .prompt-area textarea {
    width: 100%; height: 80px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: 13px; resize: vertical; font-family: inherit;
  }
  .prompt-area textarea:focus { outline: none; border-color: var(--accent); }
  .prompt-area textarea::placeholder { color: var(--text2); }
  .duration-row { padding: 0 20px 16px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .duration-row label { font-size: 12px; color: var(--text2); margin-right: 4px; }
  .dur-btn {
    padding: 4px 12px; border-radius: 12px;
    background: var(--bg); border: 1px solid var(--border); color: var(--text2); font-size: 12px; cursor: pointer;
  }
  .dur-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ratio-row { padding: 0 20px 16px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .ratio-row label { font-size: 12px; color: var(--text2); margin-right: 4px; }
  .gen-btn {
    margin: 0 20px 16px; padding: 12px; border-radius: 8px;
    background: var(--accent); border: none; color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .gen-btn:hover { background: #5a4bd4; }
  .gen-btn:disabled { background: var(--surface2); color: var(--text2); cursor: not-allowed; }
  .result-area { flex: 1; padding: 0 20px 20px; display: flex; flex-direction: column; gap: 12px; }
  .status-msg { font-size: 13px; color: var(--text2); padding: 12px; background: var(--bg); border-radius: 8px; }
  .status-msg.error { color: var(--danger); }
  .status-msg.success { color: var(--success); }
  .video-container { border-radius: 8px; overflow: hidden; background: #000; }
  .video-container video { width: 100%; display: block; }
  .history-item { background: var(--bg); border-radius: 8px; padding: 12px; font-size: 12px; }
  .history-item .prompt-text { color: var(--text2); margin-bottom: 8px; font-style: italic; }
  .api-raw { font-size: 11px; color: var(--text2); background: var(--bg); padding: 8px; border-radius: 6px; overflow: auto; max-height: 180px; white-space: pre-wrap; word-break: break-all; margin-top: 6px; }
  .auto-prompt-btn { padding: 3px 10px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--accent2); font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .auto-prompt-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .auto-prompt-btn:disabled { color: var(--text2); cursor: wait; }
  .audio-row { padding: 0 20px 16px; }
  .audio-row > label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
  .audio-upload { display: flex; align-items: center; gap: 8px; }
  .audio-btn { padding: 5px 12px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); color: var(--text2); font-size: 12px; cursor: pointer; }
  .audio-btn:hover { border-color: var(--accent); color: var(--text); }
  .audio-name { font-size: 12px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .audio-clear { background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; padding: 0 4px; }
  .cancel-btn { margin: 0 20px 8px; padding: 8px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--danger); font-size: 13px; cursor: pointer; }
  .cancel-btn:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .main { flex-direction: column; height: auto; min-height: calc(100vh - 120px); }
    .gallery-panel { padding: 12px 16px; }
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    .video-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
    .header { padding: 16px; }
    .header h1 { font-size: 16px; }
    .blogger-nav { padding: 10px 16px; }
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Douyin Face Gallery</h1>
    <span class="stats" id="stats"></span>
  </div>
  <div class="blogger-nav" id="bloggerNav"></div>
  <div class="main">
    <div class="gallery-panel">
      <div class="gallery-grid" id="gallery"></div>
    </div>
    <div class="video-panel hidden" id="videoPanel">
      <div class="panel-header">
        <h3>Wan 2.6 Video Generation</h3>
        <button class="close-btn" onclick="closePanel()">&times;</button>
      </div>
      <div class="selected-preview" id="selectedPreview"></div>
      <div class="prompt-area">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <label style="margin:0">Prompt</label>
          <button class="auto-prompt-btn" id="autoPromptBtn" onclick="autoGeneratePrompt()">Auto Generate</button>
        </div>
        <textarea id="promptInput" placeholder="Write your own or click Auto Generate..."></textarea>
      </div>
      <div class="duration-row">
        <label>Duration</label>
        <button class="dur-btn" data-dur="3">3s</button>
        <button class="dur-btn active" data-dur="5">5s</button>
        <button class="dur-btn" data-dur="8">8s</button>
        <button class="dur-btn" data-dur="10">10s</button>
        <button class="dur-btn" data-dur="15">15s</button>
      </div>
      <div class="ratio-row">
        <label>Ratio</label>
        <button class="dur-btn active" data-ratio="9:16">9:16</button>
        <button class="dur-btn" data-ratio="16:9">16:9</button>
        <button class="dur-btn" data-ratio="1:1">1:1</button>
        <button class="dur-btn" data-ratio="4:3">4:3</button>
        <button class="dur-btn" data-ratio="3:4">3:4</button>
      </div>
      <div class="audio-row">
        <label>Reference Audio <span style="color:var(--text2);font-weight:normal">(optional)</span></label>
        <div class="audio-upload">
          <input type="file" id="audioInput" accept="audio/*" style="display:none" />
          <button class="audio-btn" id="audioBtn" onclick="document.getElementById('audioInput').click()">Choose Audio File</button>
          <span class="audio-name" id="audioName">No file selected</span>
          <button class="audio-clear" id="audioClear" style="display:none" onclick="clearAudio()">&times;</button>
        </div>
      </div>
      <button class="gen-btn" id="genBtn" onclick="generateVideo()">Generate Video</button>
      <button class="cancel-btn" id="cancelBtn" style="display:none" onclick="cancelGeneration()">Cancel Generation</button>
      <div class="result-area" id="resultArea"></div>
    </div>
  </div>

<script>
// Backend proxy URL (handles Grok API calls server-side, avoiding CORS)
const API_BASE = 'https://8088-capy-1771487125563-591246-preview.happycapy.ai';

let bloggers = [];
let activeBlogger = null;
let selectedImage = null;
let selectedDuration = 5;
let selectedRatio = '9:16';
let pollAbort = null; // AbortController for cancelling generation

let audioBase64 = null;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function clearAudio() {
  audioBase64 = null;
  document.getElementById('audioInput').value = '';
  document.getElementById('audioName').textContent = 'No file selected';
  document.getElementById('audioClear').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('audioInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('audioName').textContent = file.name;
    document.getElementById('audioClear').style.display = 'inline';
    const reader = new FileReader();
    reader.onload = () => { audioBase64 = reader.result; };
    reader.readAsDataURL(file);
  });
});

// Duration buttons
document.querySelectorAll('.duration-row .dur-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.duration-row .dur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDuration = parseInt(btn.dataset.dur);
  });
});
document.querySelectorAll('.ratio-row .dur-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ratio-row .dur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRatio = btn.dataset.ratio;
  });
});

async function init() {
  const res = await fetch('data.json');
  bloggers = await res.json();
  const totalImages = bloggers.reduce((s, b) => s + b.images.length, 0);
  document.getElementById('stats').textContent = `${bloggers.length} bloggers / ${totalImages} frames`;
  renderNav();
  if (bloggers.length > 0) selectBlogger(bloggers[0].id);
}

function renderNav() {
  const nav = document.getElementById('bloggerNav');
  nav.innerHTML = `<button class="blogger-tab" data-name="__all__" onclick="selectBlogger('__all__')">
    All<span class="count">${bloggers.reduce((s,b) => s + b.images.length, 0)}</span>
  </button>`;
  bloggers.forEach(b => {
    nav.innerHTML += `<button class="blogger-tab" data-name="${b.id}" onclick="selectBlogger(${b.id})">
      ${b.name}<span class="count">${b.images.length}</span>
    </button>`;
  });
}

function selectBlogger(id) {
  activeBlogger = id;
  document.querySelectorAll('.blogger-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.name === String(id));
  });
  renderGallery();
}

// Thumbs were uploaded with original dir numbering (includes empty slot 3 for 晴子misu)
// data.json skipped 晴子misu, so IDs >= 3 are off by 1
const THUMB_ID = {0:0, 1:1, 2:2, 3:4, 4:5, 5:6, 6:7, 7:8};
function thumbUrl(bid, fname) {
  return `thumbs/${THUMB_ID[bid] ?? bid}/${fname}`;
}
function fullUrl(bid, fname) {
  return `faces/${bid}/${fname}`;
}

function renderGallery() {
  const grid = document.getElementById('gallery');
  grid.innerHTML = '';
  const list = activeBlogger === '__all__' ? bloggers : bloggers.filter(b => b.id === activeBlogger);
  list.forEach(b => {
    b.images.forEach(img => {
      const div = document.createElement('div');
      div.className = 'thumb';
      if (selectedImage && selectedImage.bloggerId === b.id && selectedImage.filename === img) {
        div.classList.add('selected');
      }
      div.innerHTML = `
        <img src="${thumbUrl(b.id, img)}" loading="lazy" />
        <div class="label">${b.name} / ${img}</div>
      `;
      div.addEventListener('click', () => selectImage(b.id, b.name, img, div));
      grid.appendChild(div);
    });
  });
}

function detectRatio(w, h) {
  const r = w / h;
  const options = [
    { ratio: '9:16', val: 9/16 },
    { ratio: '16:9', val: 16/9 },
    { ratio: '1:1', val: 1 },
    { ratio: '4:3', val: 4/3 },
    { ratio: '3:4', val: 3/4 },
  ];
  let best = options[0];
  let bestDiff = Infinity;
  for (const o of options) {
    const diff = Math.abs(r - o.val);
    if (diff < bestDiff) { bestDiff = diff; best = o; }
  }
  return best.ratio;
}

function setRatio(ratio) {
  selectedRatio = ratio;
  document.querySelectorAll('.ratio-row .dur-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.ratio === ratio);
  });
}

function selectImage(bloggerId, bloggerName, filename, el) {
  selectedImage = { bloggerId, bloggerName, filename };
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  const panel = document.getElementById('videoPanel');
  panel.classList.remove('hidden');
  document.getElementById('selectedPreview').innerHTML = `
    <img src="${thumbUrl(bloggerId, filename)}" />
    <div class="selected-info">
      <div class="blogger-name">${bloggerName}</div>
      <div class="file-name">${filename}</div>
    </div>
  `;
  // Auto-detect aspect ratio from full-res image
  const img = new Image();
  img.onload = () => setRatio(detectRatio(img.naturalWidth, img.naturalHeight));
  img.src = fullUrl(bloggerId, filename);
}

function closePanel() {
  document.getElementById('videoPanel').classList.add('hidden');
  selectedImage = null;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
}

async function toBase64(url) {
  const res = await fetch(url);
  const blob = await res.blob();
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.readAsDataURL(blob);
  });
}

async function autoGeneratePrompt() {
  if (!selectedImage) { alert('Please select an image first'); return; }
  const btn = document.getElementById('autoPromptBtn');
  const ta = document.getElementById('promptInput');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  try {
    const imageBase64 = await toBase64(fullUrl(selectedImage.bloggerId, selectedImage.filename));
    const audioName = document.getElementById('audioName').textContent;
    const hasAudio = audioName !== 'No file selected';
    const res = await fetch(`${API_BASE}/api/auto-prompt`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageBase64,
        audioFileName: hasAudio ? audioName : null,
      }),
    });
    const data = await res.json();
    if (data.prompt) {
      ta.value = data.prompt;
    } else {
      ta.value = data.error || 'Failed to generate prompt';
    }
  } catch (err) {
    ta.value = 'Error: ' + err.message;
  }
  btn.disabled = false;
  btn.textContent = 'Auto Generate';
}

function cancelGeneration() {
  if (pollAbort) { pollAbort.abort(); pollAbort = null; }
  const btn = document.getElementById('genBtn');
  btn.disabled = false;
  btn.textContent = 'Generate Video';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('resultArea').innerHTML = '<div class="status-msg">Cancelled</div>';
}

async function generateVideo() {
  if (!selectedImage) return;
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) { alert('Please enter a prompt'); return; }

  if (pollAbort) { pollAbort.abort(); }
  pollAbort = new AbortController();

  const btn = document.getElementById('genBtn');
  const area = document.getElementById('resultArea');
  btn.disabled = true;
  btn.textContent = 'Submitting...';
  document.getElementById('cancelBtn').style.display = 'block';

  try {
    area.innerHTML = '<div class="status-msg">Loading full-res image...</div>';
    const imageBase64 = await toBase64(fullUrl(selectedImage.bloggerId, selectedImage.filename));
    area.innerHTML = '<div class="status-msg">Sending to server proxy...</div>';

    const genRes = await fetch(`${API_BASE}/api/generate-video`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        imageBase64,
        prompt,
        duration: selectedDuration,
        aspect_ratio: selectedRatio,
        ...(audioBase64 ? { audioBase64 } : {}),
      }),
    });

    const genData = await genRes.json();
    area.innerHTML = `<div class="status-msg">Submit response:</div>
      <pre class="api-raw">${esc(JSON.stringify(genData, null, 2))}</pre>`;
    if (!genData.success) {
      throw new Error(genData.error || JSON.stringify(genData).slice(0, 500));
    }

    pollVideo(genData.request_id, prompt);
  } catch (err) {
    area.innerHTML += `<div class="status-msg error">${esc(err.message)}</div>`;
    finishGen();
  }
}

function finishGen() {
  document.getElementById('genBtn').disabled = false;
  document.getElementById('genBtn').textContent = 'Generate Video';
  document.getElementById('cancelBtn').style.display = 'none';
  pollAbort = null;
}

async function pollVideo(requestId, prompt) {
  const area = document.getElementById('resultArea');
  const btn = document.getElementById('genBtn');
  const signal = pollAbort?.signal;
  let attempts = 0;
  const maxAttempts = 120;
  let consecutiveErrors = 0;

  const poll = async () => {
    if (signal?.aborted) return;
    attempts++;
    if (attempts > maxAttempts) {
      area.innerHTML = `<div class="status-msg error">Timeout after ${maxAttempts * 3}s</div>`;
      btn.disabled = false; btn.textContent = 'Generate Video';
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/api/video-status/${requestId}`);
      const json = await res.json();
      const d = json.data;
      consecutiveErrors = 0;

      const raw = JSON.stringify(d, null, 2);

      if (d.status === 'done' || d.status === 'completed' || d.state === 'completed') {
        let videoUrl = null;
        if (d.video?.url) videoUrl = d.video.url;
        else if (d.video_url) videoUrl = d.video_url;
        else if (d.data?.[0]?.url) videoUrl = d.data[0].url;
        else if (d.results?.[0]?.url) videoUrl = d.results[0].url;

        if (videoUrl) {
          area.innerHTML = `
            <div class="status-msg success">Video ready (${attempts * 3}s)</div>
            <div class="video-container">
              <video src="${videoUrl}" controls autoplay loop playsinline></video>
            </div>
            <div class="history-item"><div class="prompt-text">"${esc(prompt)}"</div></div>
            <details><summary style="font-size:11px;color:var(--text2);cursor:pointer">API Response</summary>
              <pre class="api-raw">${esc(raw)}</pre></details>
          `;
        } else {
          area.innerHTML = `<div class="status-msg success">Done but no video URL found</div>
            <pre class="api-raw">${esc(raw)}</pre>`;
        }
        finishGen();
        return;
      }

      if (d.status === 'failed' || d.state === 'failed') {
        area.innerHTML = `<div class="status-msg error">Failed</div>
          <pre class="api-raw">${esc(raw)}</pre>`;
        finishGen();
        return;
      }

      const pct = d.progress ? ` ${d.progress}%` : '';
      area.innerHTML = `<div class="status-msg">Generating...${pct} (${attempts * 3}s)</div>
        <pre class="api-raw">${esc(raw)}</pre>`;
      setTimeout(poll, 3000);
    } catch (err) {
      consecutiveErrors++;
      if (consecutiveErrors >= 30) {
        area.innerHTML = `<div class="status-msg error">Poll failed after 30 retries: ${esc(err.message)}</div>`;
        finishGen();
        return;
      }
      area.innerHTML = `<div class="status-msg">Retry ${consecutiveErrors}/30: ${esc(err.message)}</div>`;
      setTimeout(poll, 3000);
    }
  };
  setTimeout(poll, 3000);
}

init();
</script>
</body>
</html>
