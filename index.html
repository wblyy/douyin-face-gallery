<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wan Spicy Video Generator</title>
<style>
  :root {
    --bg: #0a0a12; --surface: #13131f; --surface2: #1a1a2e;
    --border: #2a2a3e; --text: #e0e0e8; --text2: #8888a0;
    --accent: #6c5ce7; --accent2: #a29bfe; --danger: #ff6b6b; --success: #2ed573;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh; overflow: hidden;
  }

  /* Three-column layout */
  .app { display: flex; height: 100vh; }

  /* COL 1: Image selection */
  .col-images {
    width: 220px; min-width: 180px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .col-images .col-header {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--accent2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .upload-btn {
    padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border); color: var(--accent2);
  }
  .upload-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Custom uploads strip */
  .custom-strip {
    display: flex; gap: 4px; padding: 6px 8px; overflow-x: auto;
    border-bottom: 1px solid var(--border); min-height: 0; flex-shrink: 0;
  }
  .custom-strip:empty { display: none; }
  .custom-thumb {
    width: 36px; height: 64px; border-radius: 4px; overflow: hidden; cursor: pointer;
    border: 2px solid transparent; flex-shrink: 0; position: relative; background: var(--surface);
  }
  .custom-thumb:hover { border-color: var(--accent2); }
  .custom-thumb.selected { border-color: var(--accent); }
  .custom-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .custom-thumb .x {
    position: absolute; top: -1px; right: -1px; width: 12px; height: 12px;
    background: var(--danger); color: #fff; border: none; border-radius: 50%;
    font-size: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .custom-thumb:hover .x { opacity: 1; }

  /* Blogger tabs */
  .blogger-tabs {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 8px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .btab {
    padding: 2px 8px; border-radius: 10px; font-size: 10px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); color: var(--text2);
  }
  .btab:hover { border-color: var(--accent); color: var(--text); }
  .btab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btab .cnt { opacity: 0.6; margin-left: 2px; font-size: 9px; }

  /* Gallery grid */
  .gallery-scroll { flex: 1; overflow-y: auto; padding: 6px 8px; }
  .gallery-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 4px;
  }
  .thumb {
    aspect-ratio: 9/16; border-radius: 4px; overflow: hidden; cursor: pointer;
    border: 2px solid transparent; background: var(--surface); transition: all 0.15s;
  }
  .thumb:hover { border-color: var(--accent2); }
  .thumb.selected { border-color: var(--accent); box-shadow: 0 0 8px rgba(108,92,231,0.3); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }

  /* COL 2: Controls */
  .col-controls {
    width: 320px; min-width: 280px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; background: var(--surface);
  }
  .col-controls .col-header {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--accent2);
  }
  .controls-body { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }

  .preview-row { display: flex; gap: 8px; align-items: flex-start; }
  .preview-row img { width: 48px; height: 85px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
  .preview-info { flex: 1; font-size: 11px; }
  .preview-info .name { font-weight: 600; margin-bottom: 2px; }
  .preview-info .file { color: var(--text2); font-size: 10px; }

  .section-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

  .prompt-header { display: flex; align-items: center; justify-content: space-between; }
  .auto-btn {
    padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border); color: var(--accent2);
  }
  .auto-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .auto-btn:disabled { color: var(--text2); cursor: wait; }

  .ver-tabs { display: flex; gap: 3px; }
  .ver-tab {
    padding: 2px 8px; border-radius: 3px; font-size: 10px; cursor: pointer;
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
  }
  .ver-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .ver-tab:hover:not(.active) { border-color: var(--accent2); }

  .prompt-ta {
    width: 100%; height: 80px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); padding: 8px; font-size: 11px;
    resize: vertical; font-family: inherit;
  }
  .prompt-ta:focus { outline: none; border-color: var(--accent); }
  .prompt-ta::placeholder { color: var(--text2); }

  .cn-box {
    display: none; padding: 6px 8px; background: var(--bg); border-radius: 4px;
    font-size: 10px; color: var(--text2); line-height: 1.4; max-height: 60px; overflow-y: auto;
  }
  .cn-label { font-size: 9px; color: var(--accent2); font-weight: 600; margin-right: 3px; }

  .param-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .param-row .lbl { font-size: 10px; color: var(--text2); min-width: 48px; }
  .pbtn {
    padding: 2px 8px; border-radius: 8px; font-size: 10px; cursor: pointer;
    background: var(--bg); border: 1px solid var(--border); color: var(--text2);
  }
  .pbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .gen-btn {
    padding: 10px; border-radius: 6px; background: var(--accent); border: none;
    color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0;
  }
  .gen-btn:hover { background: #5a4bd4; }
  .gen-btn:disabled { background: var(--surface2); color: var(--text2); cursor: not-allowed; }
  .cancel-btn {
    padding: 6px; border-radius: 6px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--danger); font-size: 11px; cursor: pointer;
    flex-shrink: 0;
  }
  .cancel-btn:hover { background: var(--danger); color: #fff; }

  /* COL 3: Video playback */
  .col-video {
    flex: 1; display: flex; flex-direction: column; background: #000; min-width: 0;
  }
  .col-video .col-header {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text2); background: var(--surface);
    flex-shrink: 0;
  }
  .video-body {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 8px; overflow: hidden; min-height: 0;
  }
  .video-body video {
    max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px;
  }
  .video-body .placeholder {
    color: var(--text2); font-size: 13px; text-align: center; padding: 40px;
  }
  .video-footer {
    flex-shrink: 0; max-height: 30vh; overflow-y: auto; background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .video-footer:empty { display: none; }
  .status-bar {
    padding: 6px 12px; font-size: 11px; color: var(--text2); background: var(--surface);
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  .status-bar.error { color: var(--danger); }
  .status-bar.success { color: var(--success); }
  .api-raw {
    font-size: 9px; color: var(--text2); background: var(--bg); padding: 6px;
    border-radius: 4px; overflow: auto; max-height: 120px; white-space: pre-wrap;
    word-break: break-all; margin: 4px 12px 8px;
  }

  /* Video history */
  .history-section {
    flex-shrink: 0; border-top: 1px solid var(--border); background: var(--surface);
    max-height: 35vh; overflow-y: auto;
  }
  .history-header {
    padding: 6px 12px; font-size: 11px; color: var(--text2); font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
    background: var(--surface); z-index: 1;
  }
  .history-header button {
    font-size: 9px; background: none; border: 1px solid var(--border); color: var(--text2);
    border-radius: 3px; padding: 1px 6px; cursor: pointer;
  }
  .history-header button:hover { color: var(--danger); border-color: var(--danger); }
  .history-list { display: flex; flex-direction: column; }
  .history-item {
    display: flex; gap: 8px; padding: 6px 12px; cursor: pointer;
    border-bottom: 1px solid var(--border); align-items: center;
    transition: background 0.15s;
  }
  .history-item:hover { background: var(--surface2); }
  .history-item.active { background: var(--surface2); border-left: 2px solid var(--accent); }
  .history-thumb {
    width: 36px; height: 64px; border-radius: 3px; object-fit: cover; flex-shrink: 0;
    background: var(--bg);
  }
  .history-info { flex: 1; min-width: 0; }
  .history-info .h-time { font-size: 10px; color: var(--text2); }
  .history-info .h-prompt {
    font-size: 9px; color: var(--text2); opacity: 0.7;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px;
  }
  .history-info .h-status { font-size: 9px; margin-top: 2px; }
  .history-info .h-status.done { color: var(--success); }
  .history-info .h-status.failed { color: var(--danger); }
  .history-del {
    font-size: 12px; color: var(--text2); opacity: 0; cursor: pointer; padding: 2px 4px;
    transition: opacity 0.15s;
  }
  .history-item:hover .history-del { opacity: 1; }
  .history-del:hover { color: var(--danger); }
  .history-extend {
    font-size: 9px; color: var(--accent2); opacity: 0; cursor: pointer;
    padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px;
    background: var(--surface2); transition: opacity 0.15s; white-space: nowrap;
  }
  .history-item:hover .history-extend { opacity: 1; }
  .history-extend:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* Tree indentation for extend chains */
  .history-item .tree-indent {
    display: inline-flex; align-items: stretch; flex-shrink: 0; align-self: stretch;
  }
  .tree-indent .tree-line {
    width: 16px; position: relative; flex-shrink: 0;
  }
  .tree-indent .tree-line.vert::before {
    content: ''; position: absolute; left: 7px; top: 0; bottom: 0;
    border-left: 1px solid var(--border);
  }
  .tree-indent .tree-line.branch::before {
    content: ''; position: absolute; left: 7px; top: 0; bottom: 50%;
    border-left: 1px solid var(--accent2);
  }
  .tree-indent .tree-line.branch::after {
    content: ''; position: absolute; left: 7px; top: 50%;
    width: 8px; border-top: 1px solid var(--accent2);
  }
  .tree-indent .tree-line.pass::before {
    content: ''; position: absolute; left: 7px; top: 0; bottom: 0;
    border-left: 1px solid var(--accent2);
  }
  /* Checkbox for mix selection */
  .history-check {
    width: 14px; height: 14px; flex-shrink: 0; accent-color: var(--accent);
    cursor: pointer; margin-right: 2px;
  }
  /* Mix button in header */
  .mix-btn {
    font-size: 9px; background: none; border: 1px solid var(--accent); color: var(--accent);
    border-radius: 3px; padding: 1px 8px; cursor: pointer; margin-left: 4px;
  }
  .mix-btn:hover { background: var(--accent); color: #fff; }
  .mix-btn:disabled { opacity: 0.3; cursor: default; }
  .mix-btn:disabled:hover { background: none; color: var(--accent); }
  .wilder-btn {
    padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--danger); color: var(--danger);
  }
  .wilder-btn:hover { background: var(--danger); color: #fff; }
  .wilder-btn:disabled { opacity: 0.4; cursor: wait; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 900px) {
    .app { flex-direction: column; overflow-y: auto; }
    .col-images { width: 100%; height: 30vh; border-right: none; border-bottom: 1px solid var(--border); }
    .col-controls { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .col-video { min-height: 50vh; }
  }
</style>
</head>

      <div class="history-list" id="historyList"></div>

<script>
const API_BASE = 'https://8088-capy-1771487125563-591246-preview.happycapy.ai';
let bloggers = [], activeBlogger = null, selectedImage = null;
let selectedDuration = 5, selectedRatio = '9:16';
let pollAbort = null, promptVersions = [], activeVer = 0;
let customImages = [];
let videoHistory = JSON.parse(localStorage.getItem('videoHistory') || '[]');
let extendContext = null; // { previousPrompt, parentRid } when in extend mode
let mixSelection = new Set(); // Set of rid strings selected for mix

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Video history management
function saveHistory() { localStorage.setItem('videoHistory', JSON.stringify(videoHistory)); }
function addHistory(entry) {
  videoHistory.unshift(entry);
  if (videoHistory.length > 50) videoHistory = videoHistory.slice(0, 50);
  saveHistory(); renderHistory();
}
function clearHistory() {
  if (!confirm('Clear all history?')) return;
  videoHistory = []; saveHistory(); renderHistory();
}
function deleteHistory(idx) {
  videoHistory.splice(idx, 1); saveHistory(); renderHistory();
}
function playHistory(idx) {
  const h = videoHistory[idx]; if (!h?.videoUrl) return;
  const vBody = document.getElementById('videoBody');
  const vStatus = document.getElementById('videoStatus');
  const vFooter = document.getElementById('videoFooter');
  vBody.innerHTML = `<video src="${h.videoUrl}" controls autoplay loop playsinline></video>`;
  vStatus.textContent = `History: ${h.time}`; vStatus.style.color = 'var(--success)';
  vFooter.innerHTML = `<details style="padding:4px 12px"><summary style="font-size:10px;color:var(--text2);cursor:pointer">Prompt</summary><p style="font-size:10px;color:var(--text2);padding:4px 0;font-style:italic">${esc(h.prompt)}</p></details>`;
  document.querySelectorAll('.history-item').forEach((el,i) => el.classList.toggle('active', i===idx));
}
// Build tree-ordered list: roots first (newest on top), children indented below parent
function buildHistoryTree() {
  // Map rid -> index for quick lookup
  const ridMap = {};
  videoHistory.forEach((h, i) => { if (h.rid) ridMap[h.rid] = i; });
  // Find children of each rid
  const childrenOf = {}; // rid -> [indices]
  const roots = [];
  videoHistory.forEach((h, i) => {
    if (h.extendFrom && ridMap[h.extendFrom] !== undefined) {
      (childrenOf[h.extendFrom] = childrenOf[h.extendFrom] || []).push(i);
    } else {
      roots.push(i);
    }
  });
  // DFS to build ordered list with depth info
  const ordered = [];
  function dfs(idx, depth) {
    ordered.push({ idx, depth });
    const h = videoHistory[idx];
    const kids = h.rid ? (childrenOf[h.rid] || []) : [];
    kids.forEach(ci => dfs(ci, depth + 1));
  }
  roots.forEach(ri => dfs(ri, 0));
  return ordered;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const section = document.getElementById('historySection');
  if (videoHistory.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  const tree = buildHistoryTree();
  list.innerHTML = tree.map(({ idx: i, depth }) => {
    const h = videoHistory[i];
    const indent = depth > 0
      ? `<span class="tree-indent">${Array.from({length: depth - 1}, () => '<span class="tree-line pass"></span>').join('')}<span class="tree-line branch"></span></span>`
      : '';
    const checked = mixSelection.has(h.rid) ? 'checked' : '';
    const checkbox = h.status === 'done' && h.videoUrl
      ? `<input type="checkbox" class="history-check" ${checked} onclick="event.stopPropagation();toggleMixCheck('${h.rid}')" />`
      : '';
    const extLabel = h.extendFrom ? '<span style="font-size:8px;color:var(--accent2);margin-left:2px">EXT</span>' : '';
    return `<div class="history-item" onclick="playHistory(${i})" style="padding-left:${depth > 0 ? 4 : 12}px">
      ${indent}${checkbox}
      ${h.thumb ? `<img class="history-thumb" src="${h.thumb}" />` : '<div class="history-thumb"></div>'}
      <div class="history-info">
        <div class="h-time">${esc(h.time)}${extLabel}</div>
        <div class="h-prompt">${esc((h.prompt||'').slice(0,60))}</div>
        <div class="h-status ${h.status}">${h.status === 'done' ? 'Done' : h.status === 'failed' ? 'Failed' : 'Generating...'}</div>
      </div>
      ${h.status === 'done' && h.videoUrl ? `<span class="history-extend" onclick="event.stopPropagation();extendVideo(${i})">Extend</span>` : ''}
      <span class="history-del" onclick="event.stopPropagation();deleteHistory(${i})">x</span>
    </div>`;
  }).join('');
  updateMixBtn();
}

function toggleMixCheck(rid) {
  if (mixSelection.has(rid)) mixSelection.delete(rid);
  else mixSelection.add(rid);
  updateMixBtn();
}
function updateMixBtn() {
  const btn = document.getElementById('mixBtn');
  if (btn) {
    btn.disabled = mixSelection.size < 2;
    btn.textContent = mixSelection.size > 0 ? `Mix (${mixSelection.size})` : 'Mix';
  }
}

// Mix: sort selected videos by extend chain order, concat on server
async function mixSelected() {
  if (mixSelection.size < 2) return;
  // Build extend chain order: walk from roots to leaves
  // videoHistory is newest-first (unshift), reverse to get chronological order
  const selected = videoHistory.filter(h => mixSelection.has(h.rid) && h.videoUrl).reverse();
  if (selected.length < 2) { alert('Select at least 2 completed videos'); return; }

  // Sort by extend chain: parent before child
  const ridSet = new Set(selected.map(h => h.rid));
  // Build chain: find the root(s) among selected, then follow children
  const sorted = [];
  const remaining = new Map(selected.map(h => [h.rid, h]));

  // Find roots among selected (those whose extendFrom is not in selection)
  const roots = selected.filter(h => !h.extendFrom || !ridSet.has(h.extendFrom));
  // BFS from roots following extend chain
  const queue = [...roots];
  while (queue.length > 0) {
    const cur = queue.shift();
    if (!remaining.has(cur.rid)) continue;
    sorted.push(cur);
    remaining.delete(cur.rid);
    // Find children of cur that are in selection
    const children = selected.filter(h => h.extendFrom === cur.rid && remaining.has(h.rid));
    queue.push(...children);
  }
  // Add any remaining that weren't in the chain (disconnected selections)
  for (const h of remaining.values()) sorted.push(h);

  const videoUrls = sorted.map(h => h.videoUrl);
  const vStatus = document.getElementById('videoStatus');
  const vBody = document.getElementById('videoBody');
  vStatus.textContent = `Mixing ${videoUrls.length} videos...`; vStatus.style.color = 'var(--text2)';
  vBody.innerHTML = '<div class="placeholder">Concatenating videos on server...</div>';

  try {
    const r = await fetch(`${API_BASE}/api/concat-videos`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videoUrls }),
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || 'Concat failed');
    const mixUrl = `${API_BASE}/uploads/${d.filename}`;
    vStatus.textContent = `Mix complete (${videoUrls.length} clips)`; vStatus.style.color = 'var(--success)';
    vBody.innerHTML = `<video src="${mixUrl}" controls autoplay loop playsinline></video>`;
    // Clear selection
    mixSelection.clear();
    renderHistory();
  } catch (err) {
    vStatus.textContent = 'Mix failed: ' + (err?.message || String(err));
    vStatus.style.color = 'var(--danger)';
  }
}

renderHistory();

// Extend: extract last frame from history video, set as input image, update prompt
async function extendVideo(idx) {
  const h = videoHistory[idx]; if (!h?.videoUrl) return;
  const vStatus = document.getElementById('videoStatus');
  vStatus.textContent = 'Setting up extend...'; vStatus.style.color = 'var(--text2)';
  extendContext = { previousPrompt: h.prompt, parentRid: h.rid };
  try {
    // Extract last frame from the video via server-side ffmpeg (CORS blocks client-side)
    if (h.videoUrl) {
      vStatus.textContent = 'Extracting last frame from video...'; vStatus.style.color = 'var(--text2)';
      const frameRes = await fetch(`${API_BASE}/api/extract-last-frame`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoUrl: h.videoUrl }),
      });
      const frameData = await frameRes.json();
      if (frameData.success && frameData.filename) {
        const frameUrl = `${API_BASE}/uploads/${frameData.filename}`;
        selectedImage = { customUrl: frameUrl, customBase64: null, bloggerName: 'Extend', filename: frameData.filename };
        showPreview(frameUrl, 'Extend', 'Last frame from previous video');
        vStatus.textContent = 'Last frame extracted. Generating continuation prompt...';
      } else {
        // Fallback to source image if frame extraction fails
        console.warn('[extend] frame extraction failed, falling back to source image:', frameData.error);
        if (h.thumb) {
          selectedImage = { customUrl: h.thumb, customBase64: null, bloggerName: 'Extend', filename: 'extend-source.jpg' };
          showPreview(h.thumb, 'Extend', 'Source image (frame extraction failed)');
        }
      }
    } else if (h.thumb) {
      selectedImage = { customUrl: h.thumb, customBase64: null, bloggerName: 'Extend', filename: 'extend-source.jpg' };
      showPreview(h.thumb, 'Extend', 'Source image from previous video');
    } else if (!selectedImage) {
      throw new Error('No source image available. Select an image first, then use Extend.');
    }

    // Generate continuation prompt based on previous
    const ta = document.getElementById('promptTA');
    document.getElementById('verTabs').style.display = 'none';
    ta.value = ''; ta.placeholder = 'Generating continuation prompt...';
    vStatus.textContent = 'Generating continuation prompt...'; vStatus.style.color = 'var(--text2)';
    try {
      const extR = await fetch(`${API_BASE}/api/extend-prompt`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ previousPrompt: h.prompt, duration: selectedDuration }),
      });
      const extD = await extR.json();
      if (!extD.success) throw new Error(extD.error || 'Extend prompt failed');
      ta.value = extD.prompt;
      ta.placeholder = 'Select image, then Auto Generate or type...';
      const cnBox = document.getElementById('cnBox'), cnText = document.getElementById('cnText');
      if (extD.promptCn) { cnText.textContent = extD.promptCn; cnBox.style.display = 'block'; }
      else { cnBox.style.display = 'none'; }
      promptVersions = [];
      vStatus.textContent = 'Continuation ready. Review prompt, Wilder to escalate, or Auto Generate to re-roll.';
      vStatus.style.color = 'var(--success)';
      document.getElementById('autoBtn').textContent = 'Re-extend';
    } catch (extErr) {
      // Fallback: just copy previous prompt
      ta.value = h.prompt || '';
      ta.placeholder = 'Select image, then Auto Generate or type...';
      document.getElementById('cnBox').style.display = 'none';
      vStatus.textContent = 'Continuation failed, using previous prompt. Try Wilder to escalate.';
      vStatus.style.color = 'var(--danger)';
      document.getElementById('autoBtn').textContent = 'Re-extend';
    }
  } catch (err) {
    console.error('[extend] error:', err);
    vStatus.textContent = 'Extend failed: ' + (err?.message || String(err));
    vStatus.style.color = 'var(--danger)';
  }
}

// Wilder: escalate current prompt via Grok
async function wilderPrompt() {
  const ta = document.getElementById('promptTA');
  const prompt = ta.value.trim();
  if (!prompt) { alert('Write or generate a prompt first'); return; }
  const btn = document.getElementById('wilderBtn');
  btn.disabled = true; btn.textContent = 'Escalating...';
  try {
    const r = await fetch(`${API_BASE}/api/wilder-prompt`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, duration: selectedDuration }),
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || 'Failed');
    ta.value = d.prompt;
    const cnBox = document.getElementById('cnBox'), cnText = document.getElementById('cnText');
    if (d.promptCn) { cnText.textContent = d.promptCn; cnBox.style.display = 'block'; }
    document.getElementById('verTabs').style.display = 'none';
    promptVersions = [];
  } catch (e) {
    alert('Wilder failed: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'Wilder';
}

// Param buttons
document.querySelectorAll('.pbtn[data-dur]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.pbtn[data-dur]').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); selectedDuration = +b.dataset.dur;
}));
document.querySelectorAll('.pbtn[data-ratio]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.pbtn[data-ratio]').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); selectedRatio = b.dataset.ratio;
}));
function setRatio(r) {
  selectedRatio = r;
  document.querySelectorAll('.pbtn[data-ratio]').forEach(b => b.classList.toggle('active', b.dataset.ratio === r));
}
function detectRatio(w, h) {
  const r = w/h, opts = [{r:'9:16',v:9/16},{r:'16:9',v:16/9},{r:'1:1',v:1},{r:'4:3',v:4/3},{r:'3:4',v:3/4}];
  let best = opts[0], bd = Infinity;
  for (const o of opts) { const d = Math.abs(r-o.v); if (d < bd) { bd = d; best = o; } }
  return best.r;
}

// File upload
document.getElementById('fileInput').addEventListener('change', e => {
  Array.from(e.target.files).forEach(f => {
    const reader = new FileReader();
    reader.onload = () => {
      customImages.push({ id: Date.now()+'_'+Math.random().toString(36).slice(2,5), base64: reader.result, url: null, name: f.name });
      renderCustom();
    };
    reader.readAsDataURL(f);
  });
  e.target.value = '';
});
function renderCustom() {
  const c = document.getElementById('customStrip'); c.innerHTML = '';
  customImages.forEach(img => {
    const d = document.createElement('div');
    d.className = 'custom-thumb' + (selectedImage?.customId === img.id ? ' selected' : '');
    d.innerHTML = `<img src="${img.base64}"/><button class="x" onclick="event.stopPropagation();rmCustom('${img.id}')">&times;</button>`;
    d.addEventListener('click', () => pickCustom(img));
    c.appendChild(d);
  });
}
function rmCustom(id) {
  customImages = customImages.filter(i => i.id !== id);
  renderCustom();
  if (selectedImage?.customId === id) { selectedImage = null; hidePreview(); }
}
async function pickCustom(img) {
  if (!img.url) {
    try {
      const r = await fetch(`${API_BASE}/api/upload-image`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({imageBase64:img.base64}) });
      const d = await r.json();
      if (d.filename) img.url = `${API_BASE}/uploads/${d.filename}`;
      else { alert('Upload failed'); return; }
    } catch(e) { alert('Upload error: '+e.message); return; }
  }
  selectedImage = { customId:img.id, customUrl:img.url, customBase64:img.base64, bloggerName:'Custom', filename:img.name };
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
  renderCustom(); showPreview(img.base64, 'Custom Upload', img.name);
  const tmp = new Image(); tmp.onload = () => setRatio(detectRatio(tmp.naturalWidth, tmp.naturalHeight)); tmp.src = img.base64;
}

// Init
async function init() {
  const r = await fetch('data.json'); bloggers = await r.json();
  renderTabs(); if (bloggers.length) pickBlogger(bloggers[0].id);
}
const THUMB_ID = {0:0,1:1,2:2,3:4,4:5,5:6,6:7,7:8};
function thumbUrl(b,f) { return `thumbs/${THUMB_ID[b]??b}/${f}`; }
function fullUrl(b,f) { return `faces/${b}/${f}`; }

function renderTabs() {
  const c = document.getElementById('bloggerTabs');
  c.innerHTML = `<div class="btab" data-id="__all__" onclick="pickBlogger('__all__')">All<span class="cnt">${bloggers.reduce((s,b)=>s+b.images.length,0)}</span></div>`;
  bloggers.forEach(b => { c.innerHTML += `<div class="btab" data-id="${b.id}" onclick="pickBlogger(${b.id})">${b.name}<span class="cnt">${b.images.length}</span></div>`; });
}
function pickBlogger(id) {
  activeBlogger = id;
  document.querySelectorAll('.btab').forEach(t => t.classList.toggle('active', t.dataset.id === String(id)));
  renderGallery();
}
function renderGallery() {
  const g = document.getElementById('gallery'); g.innerHTML = '';
  const list = activeBlogger === '__all__' ? bloggers : bloggers.filter(b => b.id === activeBlogger);
  list.forEach(b => b.images.forEach(img => {
    const d = document.createElement('div');
    d.className = 'thumb' + (selectedImage?.bloggerId===b.id && selectedImage?.filename===img ? ' selected' : '');
    d.innerHTML = `<img src="${thumbUrl(b.id,img)}" loading="lazy"/>`;
    d.addEventListener('click', () => pickImage(b.id, b.name, img, d));
    g.appendChild(d);
  }));
}
function pickImage(bid, bname, fname, el) {
  extendContext = null; // Clear extend mode when manually selecting image
  document.getElementById('autoBtn').textContent = 'Auto Generate';
  selectedImage = { bloggerId:bid, bloggerName:bname, filename:fname };
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected'));
  document.querySelectorAll('.custom-thumb').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  showPreview(thumbUrl(bid, fname), bname, fname);
  const tmp = new Image(); tmp.onload = () => setRatio(detectRatio(tmp.naturalWidth, tmp.naturalHeight)); tmp.src = fullUrl(bid, fname);
}
function showPreview(src, name, file) {
  document.getElementById('previewRow').style.display = 'flex';
  document.getElementById('previewImg').src = src;
  document.getElementById('previewName').textContent = name;
  document.getElementById('previewFile').textContent = file;
}
function hidePreview() { document.getElementById('previewRow').style.display = 'none'; }

// Auto prompt
async function toBase64(url) {
  const r = await fetch(url); const b = await r.blob();
  return new Promise(res => { const rd = new FileReader(); rd.onload = () => res(rd.result); rd.readAsDataURL(b); });
}
function selectVer(i) {
  activeVer = i;
  document.querySelectorAll('.ver-tab').forEach(t => t.classList.toggle('active', +t.dataset.v === i));
  if (promptVersions[i]) {
    document.getElementById('promptTA').value = promptVersions[i].prompt;
    const box = document.getElementById('cnBox'), txt = document.getElementById('cnText');
    if (promptVersions[i].promptCn) { txt.textContent = promptVersions[i].promptCn; box.style.display = 'block'; }
    else { box.style.display = 'none'; }
  }
}
async function autoPrompt() {
  if (!selectedImage) { alert('Select an image first'); return; }
  const btn = document.getElementById('autoBtn'), ta = document.getElementById('promptTA');
  const cnBox = document.getElementById('cnBox'), cnText = document.getElementById('cnText');

  // If in extend mode, generate continuation prompt instead of fresh prompt
  if (extendContext?.previousPrompt) {
    btn.disabled = true; btn.textContent = 'Extending...';
    try {
      const r = await fetch(`${API_BASE}/api/extend-prompt`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ previousPrompt: extendContext.previousPrompt, duration: selectedDuration }),
      });
      const d = await r.json();
      if (!d.success) throw new Error(d.error || 'Extend failed');
      ta.value = d.prompt;
      if (d.promptCn) { cnText.textContent = d.promptCn; cnBox.style.display = 'block'; }
      else { cnBox.style.display = 'none'; }
      document.getElementById('verTabs').style.display = 'none';
      promptVersions = [];
    } catch(e) { ta.value = 'Error: ' + e.message; }
    btn.disabled = false; btn.textContent = 'Auto Generate';
    return;
  }

  // Normal mode: fresh prompt from image
  btn.disabled = true; btn.textContent = 'Analyzing...';
  try {
    const b64 = selectedImage.customBase64 || await toBase64(fullUrl(selectedImage.bloggerId, selectedImage.filename));
    const r = await fetch(`${API_BASE}/api/auto-prompt`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({imageBase64:b64, duration:selectedDuration}) });
    const d = await r.json();
    if (d.versions?.length >= 2) {
      promptVersions = d.versions;
      const tabs = document.getElementById('verTabs'); tabs.style.display = 'flex';
      tabs.innerHTML = d.versions.map((v,i) => `<div class="ver-tab${i===0?' active':''}" data-v="${i}" onclick="selectVer(${i})">${v.label}</div>`).join('');
      selectVer(0);
    } else if (d.prompt) {
      promptVersions = [{prompt:d.prompt, promptCn:d.promptCn||''}];
      document.getElementById('verTabs').style.display = 'none';
      ta.value = d.prompt;
      if (d.promptCn) { cnText.textContent = d.promptCn; cnBox.style.display = 'block'; }
    } else { ta.value = d.error || 'Failed'; }
  } catch(e) { ta.value = 'Error: '+e.message; }
  btn.disabled = false; btn.textContent = 'Auto Generate';
}

// Generate video
function cancel() {
  if (pollAbort) { pollAbort.abort(); pollAbort = null; }
  document.getElementById('genBtn').disabled = false; document.getElementById('genBtn').textContent = 'Generate Video';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('videoStatus').textContent = 'Cancelled';
}
function finishGen() {
  document.getElementById('genBtn').disabled = false; document.getElementById('genBtn').textContent = 'Generate Video';
  document.getElementById('cancelBtn').style.display = 'none'; pollAbort = null;
}
async function generate() {
  if (!selectedImage) return;
  const prompt = document.getElementById('promptTA').value.trim();
  if (!prompt) { alert('Enter a prompt'); return; }
  if (pollAbort) pollAbort.abort();
  pollAbort = new AbortController();
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  document.getElementById('cancelBtn').style.display = 'block';
  const vBody = document.getElementById('videoBody');
  const vStatus = document.getElementById('videoStatus');
  const vFooter = document.getElementById('videoFooter');
  vBody.innerHTML = '<div class="placeholder">Submitting...</div>';
  vFooter.innerHTML = '';
  try {
    const imageUrl = selectedImage.customUrl || `https://wblyy.github.io/douyin-face-gallery/faces/${selectedImage.bloggerId}/${selectedImage.filename}`;
    const r = await fetch(`${API_BASE}/api/generate-video`, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({imageUrl, prompt, duration:selectedDuration, aspect_ratio:selectedRatio}) });
    const d = await r.json();
    vStatus.textContent = 'Submitted, waiting...';
    vFooter.innerHTML = `<pre class="api-raw">${esc(JSON.stringify(d,null,2))}</pre>`;
    if (!d.success) throw new Error(d.error || JSON.stringify(d).slice(0,500));
    const thumbUrl = selectedImage.customUrl || imageUrl;
    pollVideo(d.request_id, prompt, thumbUrl);
  } catch(e) {
    vStatus.className = 'col-header'; vStatus.textContent = 'Error: ' + e.message;
    vStatus.style.color = 'var(--danger)';
    finishGen();
  }
}
async function pollVideo(rid, prompt, thumbUrl) {
  const vBody = document.getElementById('videoBody');
  const vStatus = document.getElementById('videoStatus');
  const vFooter = document.getElementById('videoFooter');
  const signal = pollAbort?.signal;
  let att = 0, maxAtt = 120, errCnt = 0;
  const poll = async () => {
    if (signal?.aborted) return;
    att++;
    if (att > maxAtt) { vStatus.textContent = `Timeout (${maxAtt*3}s)`; vStatus.style.color='var(--danger)'; finishGen(); return; }
    try {
      const r = await fetch(`${API_BASE}/api/video-status/${rid}`);
      const j = await r.json(); const d = j.data; errCnt = 0;
      const raw = JSON.stringify(d,null,2);
      if (d.status==='done'||d.status==='completed'||d.state==='completed') {
        let url = d.video?.url || d.video_url || d.data?.[0]?.url || d.results?.[0]?.url;
        if (url) {
          vStatus.textContent = `Video ready (${att*3}s)`; vStatus.style.color='var(--success)';
          vBody.innerHTML = `<video src="${url}" controls autoplay loop playsinline></video>`;
          vFooter.innerHTML = `<details style="padding:4px 12px"><summary style="font-size:10px;color:var(--text2);cursor:pointer">Prompt</summary><p style="font-size:10px;color:var(--text2);padding:4px 0;font-style:italic">${esc(prompt)}</p></details>
            <details style="padding:4px 12px"><summary style="font-size:10px;color:var(--text2);cursor:pointer">API Response</summary><pre class="api-raw">${esc(raw)}</pre></details>`;
          const ef = extendContext?.parentRid || null;
          addHistory({ time: new Date().toLocaleString('zh-CN'), prompt, thumb: thumbUrl, videoUrl: url, status: 'done', rid, extendFrom: ef });
          if (extendContext) extendContext = null;
        } else {
          vStatus.textContent = 'Done but no video URL'; vStatus.style.color='var(--danger)';
          vFooter.innerHTML = `<pre class="api-raw">${esc(raw)}</pre>`;
          addHistory({ time: new Date().toLocaleString('zh-CN'), prompt, thumb: thumbUrl, videoUrl: null, status: 'failed', rid, extendFrom: extendContext?.parentRid || null });
          if (extendContext) extendContext = null;
        }
        finishGen(); return;
      }
      if (d.status==='failed'||d.state==='failed') {
        vStatus.textContent = 'Failed'; vStatus.style.color='var(--danger)';
        vBody.innerHTML = '<div class="placeholder">Generation failed</div>';
        vFooter.innerHTML = `<pre class="api-raw">${esc(raw)}</pre>`;
        addHistory({ time: new Date().toLocaleString('zh-CN'), prompt, thumb: thumbUrl, videoUrl: null, status: 'failed', rid, extendFrom: extendContext?.parentRid || null });
        if (extendContext) extendContext = null;
        finishGen(); return;
      }
      const pct = d.progress ? ` ${d.progress}%` : '';
      vStatus.textContent = `Generating...${pct} (${att*3}s)`; vStatus.style.color='var(--text2)';
      vFooter.innerHTML = `<pre class="api-raw">${esc(raw)}</pre>`;
      setTimeout(poll, 3000);
    } catch(e) {
      errCnt++;
      if (errCnt >= 30) { vStatus.textContent = 'Poll failed'; vStatus.style.color='var(--danger)'; finishGen(); return; }
      vStatus.textContent = `Retry ${errCnt}/30...`; setTimeout(poll, 3000);
    }
  };
  setTimeout(poll, 3000);
}

init();
</script>
